apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: wanderlust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/baghel004/wanderlust-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: USER_SERVICE_URL
              value: "http://user-service:4001"
            - name: LISTING_SERVICE_URL
              value: "http://listing-service:4002"
            - name: REVIEW_SERVICE_URL
              value: "http://review-service:4003"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wanderlust-secrets
                  key: JWT_SECRET
            - name: MAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: wanderlust-secrets
                  key: MAP_TOKEN
          resources:
            requests:
              memory: "80Mi"
              cpu: "50m"
            limits:
              memory: "160Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: wanderlust
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wanderlust-ingress
  namespace: wanderlust
  annotations:
    # allow image uploads through nginx (default limit is 1m)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
