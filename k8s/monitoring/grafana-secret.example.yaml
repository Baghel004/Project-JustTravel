# Copy to k8s/monitoring/grafana-secret.yaml (gitignored), fill in your Grafana Cloud
# remote-write credentials, then: kubectl apply -f k8s/monitoring/grafana-secret.yaml
# Get these from: Grafana Cloud → Connections → Prometheus (remote-write) / Access Policies.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud
  namespace: wanderlust
type: Opaque
stringData:
  # The "Remote Write Endpoint" URL (ends with /api/prom/push)
  GRAFANA_CLOUD_PROM_URL: "https://prometheus-prod-XX-prod-REGION.grafana.net/api/prom/push"
  # Your Prometheus instance's "Username / Instance ID" (a number)
  GRAFANA_CLOUD_PROM_USER: "1234567"
  # An access-policy token with the metrics:write scope (starts with glc_...)
  GRAFANA_CLOUD_API_KEY: "glc_xxxxxxxxxxxxxxxxxxxxxxxx"
